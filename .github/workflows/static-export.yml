name: Static export & deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      crawl_sample_size:
        description: "How many pages the post-deploy crawler should validate"
        required: false
        default: "10"
  schedule:
    - cron: "*/30 * * * *"
  repository_dispatch:
    types: [wordpress-updated]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://mranonymousnwo.github.io/the-patch
      WP_SITE: patch98.wordpress.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site from WordPress
        run: node scripts/build-static.mjs

      # ---- Fetch previous artifacts for diffing ----
      - name: Download previous JSON-LD report (build)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: static-export.yml
          name: jsonld-report-build
          path: prev-report
          if_no_artifact_found: warn
          search_artifacts: true
        continue-on-error: true

      - name: Download previous site-build (for sitemap/canonical diff)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: static-export.yml
          name: site-build
          path: prev-site
          if_no_artifact_found: warn
          search_artifacts: true
        continue-on-error: true

      # ---- Diff steps (report-only, never fail build) ----
      - name: Validate JSON-LD (build output) + diff
        id: validate
        run: |
          if [ -f prev-report/jsonld-report.json ]; then
            node scripts/validate-jsonld.mjs --diff prev-report/jsonld-report.json
          else
            echo "No previous report found; skipping diff."
            node scripts/validate-jsonld.mjs
          fi
        continue-on-error: true

      - name: Sitemap diff
        run: node scripts/diff-sitemap.mjs prev-site/sitemap.xml dist-static/sitemap.xml dist-static
        continue-on-error: true

      - name: Canonical & og:url diff
        run: node scripts/diff-canonicals.mjs prev-site dist-static dist-static
        continue-on-error: true

      - name: Publish diff report page (dist-static/diff/)
        run: node scripts/build-diff-page.mjs
        continue-on-error: true

      # ---- Artifact uploads ----
      - name: Upload JSON-LD report (build)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jsonld-report-build
          path: |
            dist-static/jsonld-report.json
            dist-static/jsonld-report.html
            dist-static/jsonld-diff.json
            dist-static/jsonld-diff.md

      - name: Upload site build (for next-run diffs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          retention-days: 14
          path: dist-static

      # ---- Run summary ----
      - name: Surface diffs in run summary
        if: always()
        run: |
          {
            for f in dist-static/jsonld-diff.md dist-static/sitemap-diff.md dist-static/canonical-diff.md; do
              if [ -f "$f" ]; then echo; echo "---"; echo; cat "$f"; fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail build only on CRITICAL JSON-LD findings
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::Critical JSON-LD findings in build output. See artifact jsonld-report-build."
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  postdeploy-crawl:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      CRAWL_SAMPLE_SIZE: ${{ github.event.inputs.crawl_sample_size || '10' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for deployment to be reachable
        run: |
          URL="${{ needs.deploy.outputs.page_url }}"
          for i in 1 2 3 4 5 6; do
            if curl -sfI "$URL" >/dev/null; then echo "live: $URL"; break; fi
            echo "waiting for $URL (attempt $i)..."
            sleep 10
          done

      - name: Download previous live JSON-LD report (for regression gate)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: static-export.yml
          name: jsonld-report-live
          path: prev-live
          if_no_artifact_found: warn
          search_artifacts: true
        continue-on-error: true

      - name: Re-validate JSON-LD against live site (regression gate)
        id: crawl
        run: |
          if [ -f prev-live/jsonld-report.json ]; then
            node scripts/validate-jsonld.mjs \
              --crawl "${{ needs.deploy.outputs.page_url }}" \
              --sample "${CRAWL_SAMPLE_SIZE}" \
              --regression-gate \
              --diff prev-live/jsonld-report.json
          else
            node scripts/validate-jsonld.mjs \
              --crawl "${{ needs.deploy.outputs.page_url }}" \
              --sample "${CRAWL_SAMPLE_SIZE}" \
              --regression-gate
          fi
        continue-on-error: true

      - name: Upload JSON-LD report (live crawl)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jsonld-report-live
          path: |
            jsonld-report.json
            jsonld-report.html
            jsonld-diff.json
            jsonld-diff.md

      - name: Fail post-deploy only on JSON-LD REGRESSIONS
        if: steps.crawl.outcome == 'failure'
        run: |
          echo "::error::JSON-LD critical regressions detected on live site. See artifact jsonld-report-live."
          exit 1
